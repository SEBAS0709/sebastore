{% extends "base.html" %}
{% block title %}Registrarse - SebaStore{% endblock %}
{% block content %}

<div class="auth-container">
  <div class="auth-card">
    <h1>📝 Crear cuenta</h1>
    <p class="subtitle">Únete a SebaStore para trackear tus ofertas favoritas</p>
    
    <form method="post" action="/registro" class="auth-form">
      <div class="form-group">
        <label for="nombre_usuario">Nombre de usuario</label>
        <input 
          type="text" 
          id="nombre_usuario" 
          name="nombre_usuario" 
          placeholder="tu_usuario"
          required
          minlength="3"
        >
        <small>Mínimo 3 caracteres</small>
      </div>

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          placeholder="tu@email.com"
          required
        >
      </div>

      <div class="form-group">
        <label for="contraseña">Contraseña</label>
        <input 
          type="password" 
          id="contraseña" 
          name="contraseña" 
          placeholder="••••••••"
          required
          minlength="6"
        >
        <small>Mínimo 6 caracteres</small>
      </div>

      <div class="form-group">
        <label for="confirmar_contraseña">Confirmar contraseña</label>
        <input 
          type="password" 
          id="confirmar_contraseña" 
          name="confirmar_contraseña" 
          placeholder="••••••••"
          required
        >
      </div>

      <button type="submit" class="btn btn-accent btn-large">Crear cuenta</button>
    </form>

    <div class="auth-footer">
      <p>¿Ya tienes cuenta? <a href="/login">Inicia sesión aquí</a></p>
    </div>
  </div>
</div>

{% endblock %}
